name: Deploy to DigitalOcean droplet

on:
  push:
    branches: [main]
  workflow_dispatch:

# The site is a static export (see next.config.ts, DROPLET=true). We build the
# `out/` folder here and rsync it to the droplet, where Caddy serves it as a
# static file_server alongside the guest-concierge service. No Node runtime,
# pm2, or `next start` runs on the droplet — keeps the 512 MB box comfortable.
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          DROPLET: "true"

      - name: Deploy static site to droplet
        uses: easingthemes/ssh-deploy@v5.1.2
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || '22' }}
          # Trailing slash on SOURCE copies the contents of out/ into TARGET.
          # --delete prunes files that no longer exist in the new build.
          SOURCE: "out/"
          TARGET: /opt/cottagecreators/site
          ARGS: "-rltgoDzvO --delete"
