name: Deploy to DigitalOcean droplet

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploys the DYNAMIC Next.js site: rsync the repo to the droplet and rebuild
# the `website` container that Caddy reverse-proxies cottagecreators.ca to.
# (The previous static-export -> Caddy file_server flow is retired; the apex
# now runs the Node server so live availability + quotes work.)
concurrency:
  group: droplet-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Rsync source to droplet
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || '22' }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy -p $REMOTE_PORT -o StrictHostKeyChecking=accept-new" \
            --exclude node_modules --exclude .next --exclude .git --exclude out \
            --exclude .env --exclude '.env.*' --exclude .api-export-stash \
            --exclude design_handoff_cottage_creators \
            ./ "$REMOTE_USER@$REMOTE_HOST:/opt/cottagecreators/app/"

      - name: Rebuild and restart the website container
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || '22' }}
        run: |
          ssh -i ~/.ssh/id_deploy -p "$REMOTE_PORT" -o StrictHostKeyChecking=accept-new \
            "$REMOTE_USER@$REMOTE_HOST" bash -s <<'EOSSH'
          set -e
          cd /opt/concierge
          docker compose build website
          docker compose --profile web up -d website
          s=none
          for i in $(seq 1 40); do
            s=$(docker inspect --format '{{.State.Health.Status}}' concierge-website-1 2>/dev/null || echo none)
            [ "$s" = healthy ] && break
            sleep 3
          done
          echo "website health: $s"
          [ "$s" = healthy ]
          EOSSH
